; WiFi bridge between a K3NG GS-232B rotator controller and the network.
; Target: LOLIN S3 Mini (ESP32-S3). See DESIGN.md for the architecture.

[platformio]
src_dir = src

[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
build_flags = -Wall
board_build.filesystem = littlefs
; No SoftwareSerial dependency: the ESP32 GPIO matrix puts a real hardware
; UART on whichever pins we like, which is one of the reasons for this board.
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    ESP32Async/ESPAsyncWebServer@^3.6.0

; Host-side unit tests for the protocol layer. lib/gs232 has no Arduino
; dependency precisely so it can run here; PlatformIO does not build src/ for
; tests unless test_build_src is set, so main.cpp and friends stay out of it.
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -Wall
